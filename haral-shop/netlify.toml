# haral-shop 전용 (Netlify Base directory = haral-shop 일 때)
# 루트 netlify.toml 과 동일 설정. 하나만 적용되면 됩니다.

[build]
  command = "npm ci && npm run build"
  publish = "out"

[build.environment]
  NODE_VERSION = "22"

[[redirects]]
  from = "/"
  to = "/ko/"
  status = 302

[[redirects]]
  from = "/api/*"
  to = "https://shopping-production-1e67.up.railway.app/api/:splat"
  status = 200
  force = true

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/manifest.webmanifest"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/*/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
